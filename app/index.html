<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <link rel="stylesheet" href="style.css">
  <meta charset="UTF-8">
  <title>旅遊分帳系統</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }

    h2 {
      margin-top: 40px;
    }

    input {
      margin: 5px 0;
      padding: 5px;
    }

    button {
      padding: 6px 12px;
      margin-top: 10px;
      cursor: pointer;
    }

    .section {
      border: 1px solid #ccc;
      padding: 15px;
      margin-top: 20px;
      border-radius: 8px;
    }

    .member-row,
    .payer-row,
    .sharer-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 5px;
    }

    .summary-box {
      background: #f5f5f5;
      padding: 10px;
      margin-top: 10px;
      border-radius: 6px;
    }
  </style>
</head>
<body>

  <h1>團體旅遊分帳系統</h1>

  <!-- 成員管理 -->
  <div class="section">
    <h2>新增成員</h2>

    <input type="text" id="memberName" placeholder="輸入成員名字">
    <button onclick="addMember()">新增成員</button>

    <div id="memberList"></div>
  </div>


  <!-- 新增支出 -->
  <div class="section">
    <h2>新增支出</h2>

    <label>日期：</label><br>
    <input type="date" id="expenseDate"><br>

    <label>品項：</label><br>
    <input type="text" id="expenseItem" placeholder="例如：晚餐"><br>

    <label>總金額：</label><br>
    <input type="number" id="expenseAmount" placeholder="例如：1200"><br>

    <h3>付款人</h3>
    <div id="payerContainer"></div>

    <h3>分攤人</h3>
    <div id="sharerContainer"></div>

    <button onclick="addExpense()">新增支出</button>
  </div>


  <!-- 結算結果 -->
  <div class="section">
    <h2>結算結果</h2>
    <div id="summary"></div>
  </div>


  <script src="app.js"></script>
</body>
</html>
