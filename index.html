<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>旅遊分帳系統 Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>團體旅遊分帳系統 Pro</h1>

<!-- ===== 群組管理 ===== -->
<div class="section">
  <h2>建立群組</h2>
  <input type="text" id="groupName" placeholder="例如：沖繩旅行">
  <button onclick="createGroup()">建立群組</button>
  <div id="groupList"></div>
</div>

<!-- ===== 成員管理 ===== -->
<div class="section">
  <h2>新增成員</h2>
  <input type="text" id="memberName" placeholder="輸入成員名字">
  <button onclick="addMember()">新增成員</button>
  <div id="memberList"></div>
</div>

<!-- ===== 新增支出 ===== -->
<div class="section">
  <h2>新增支出</h2>

  <label>日期</label>
  <input type="date" id="date">

  <label>品項</label>
  <input type="text" id="item">

  <label>金額</label>
  <input type="number"
         id="amount"
         onchange="updatePayerAmounts(); updateSharerAmounts();">

  <h3>
    付款人
    <button type="button" onclick="toggleManualPayer()">手動模式</button>
  </h3>
  <div id="payerList"></div>

  <h3>
    分攤人
    <button type="button" onclick="toggleManualSharer()">手動模式</button>
  </h3>
  <div id="sharerList"></div>

  <button onclick="addExpense()">新增支出</button>
</div>

<!-- ===== 支出列表 ===== -->
<div class="section">
  <h2>支出列表</h2>
  <div id="expenseList"></div>
</div>

<!-- ===== 結算結果 ===== -->
<div class="section">
  <h2>結算結果</h2>
  <div id="summary"></div>

  <h3>清算建議</h3>
  <div id="settlement"></div>
</div>

<script src="app.js"></script>
</body>
</html>
